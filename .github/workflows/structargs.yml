name: Structargs CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/mod/structargs.zig"
      - ".github/workflows/structargs.yml"
  push:
    branches:
      - main
    paths:
      - "src/mod/structargs.zig"
      - ".github/workflows/structargs.yml"

jobs:
  memory-leak:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
      - name: Memory leak detect
        run: |
          sudo apt update && sudo apt install -y valgrind libcurl4-openssl-dev
          zig build -Dcpu=baseline --verbose
          TEST_BINARY=./zig-out/bin/structargs-demo
          valgrind --leak-check=full --tool=memcheck \
          --show-leak-kinds=all --error-exitcode=1 ${TEST_BINARY} --output a.out \
          sub1 --a 123 hello world
